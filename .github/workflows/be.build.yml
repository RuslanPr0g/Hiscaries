name: .NET CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create ASP.NET Core HTTPS dev certificate
        # Every API resource binds an HTTPS endpoint (WithHttpsEndpoint in the
        # AppHost). Without a dev certificate Kestrel cannot bind and each API
        # process crashes seconds after starting (Running -> Finished in the
        # Aspire diag log), so StartAsync times out. The cert only needs to
        # exist, not be trusted: Aspire's health probe and the testing
        # HttpClient skip certificate validation (verified locally, where the
        # cert is untrusted and tests pass).
        run: dotnet dev-certs https

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        working-directory: server/src
        run: dotnet restore Hiscary.sln

      - name: Build
        working-directory: server/src
        run: dotnet build Hiscary.sln

      - name: Run unit tests
        working-directory: server/src
        run: dotnet test Hiscary.UserAccounts.Tests/Hiscary.UserAccounts.Tests.csproj

      - name: Verify Docker
        run: |
          docker version
          docker info
          docker run --rm hello-world

      - name: Raise vm.max_map_count for Elasticsearch
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Prepare Elasticsearch bind-mount directory
        # Elasticsearch's container runs as non-root UID 1000. On a fresh
        # checkout this gitignored directory doesn't exist, so Docker
        # auto-creates it owned by root, and the container can't write its
        # node.lock file into it (fails with AccessDeniedException).
        run: |
          mkdir -p server/src/elasticsearch-data
          chmod 777 server/src/elasticsearch-data

      - name: Run integration tests
        working-directory: server/src
        env:
          # These parameters only gate short-lived containers scoped to this CI run
          # (destroyed when the job ends), so a repo secret falls back to a
          # CI-only placeholder rather than failing the build when unset.
          Parameters__postgres-password: ${{ secrets.POSTGRES_PASSWORD || 'ci-only-postgres-password' }}
          Parameters__rabbitmq-password: ${{ secrets.RABBITMQ_PASSWORD || 'ci-only-rabbitmq-password' }}
          Parameters__elasticsearch-password: ${{ secrets.ELASTICSEARCH_PASSWORD || 'ci-only-elasticsearch-password' }}
          Parameters__rediscache-password: ${{ secrets.REDISCACHE_PASSWORD || 'ci-only-rediscache-password' }}
          # Locally these come from .NET user secrets on the AppHost project.
          # Without them the AppHost forwards empty strings and every API
          # crashes at startup ("Failed to convert configuration value '' at
          # 'JwtSettings:TokenLifeTime'"), which is what made StartAsync time
          # out in CI. CI-only throwaway values, never used outside this job.
          JwtSettings__Key: ${{ secrets.JWT_KEY || 'ci-only-jwt-signing-key-0123456789abcdefghij' }}
          JwtSettings__Issuer: hiscary-ci
          JwtSettings__Audience: hiscary-ci
          JwtSettings__TokenLifeTime: "01:00:00"
          # Must be a structurally valid bcrypt salt (BCrypt.HashPassword(password, salt)).
          SaltSettings__StoredSalt: "$2a$11$abcdefghijklmnopqrstuv"
        run: dotnet test Hiscary.UserAccounts.IntegrationTests/Hiscary.UserAccounts.IntegrationTests.csproj

      - name: Dump Aspire resource diagnostics
        if: always()
        run: |
          find server/src -name "aspire-fixture-diag.log" -exec cat {} \;
          echo "--- docker ps -a ---"
          docker ps -a
