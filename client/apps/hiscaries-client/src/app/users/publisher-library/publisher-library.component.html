@if (libraryInfo) {
  <app-library
    [library]="libraryInfo"
    [stories]="stories()"
    [isLoading]="isLoading()"
    [isAbleToSubscribe]="!!libraryInfo"
    [isSubscribed]="isSubscribed"
    [isSubscribeLoading]="isSubscribeLoading"
    (subscribed)="subscribeAction()"
    (unSubscribed)="unSubscribeAction()"
  ></app-library>
} @else {
  This library doesn't exist
}


<div #loadMoreAnchor class="load-more-anchor"></div>
