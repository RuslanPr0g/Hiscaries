@if (!isEditMode) {
  <app-library-general-view
    [library]="library()"
    [isAbleToEdit]="isAbleToEdit()"
    [isAbleToSubscribe]="isAbleToSubscribe()"
    [isSubscribed]="isSubscribed()"
    [isSubscribeLoading]="isSubscribeLoading()"
    (editStarted)="startEdit()"
    (subscribed)="subscribeAction()"
    (unSubscribed)="unSubscribeAction()"
  />
} @else {
  <app-library-general-edit
    [library]="library()"
    [isAbleToEdit]="isAbleToEdit()"
    (editCancelled)="cancelEdit()"
    (editSaved)="saveEdit($event)"
  />
}

@if (stories()) {
  @if (stories()!.Items.length > 0 || isLoading()) {
    <app-search-story-results [stories]="stories()" [isLoading]="isLoading()" class="w-full" />
  } @else {
    <div class="center">Nothing posted so far!</div>
  }
}
