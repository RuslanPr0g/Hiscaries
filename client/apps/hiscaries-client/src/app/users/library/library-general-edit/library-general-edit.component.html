@if (library()) {
  <form [formGroup]="modifyForm" (ngSubmit)="onSubmit()">
    <div class="library">
      <div
        class="profile-card background-image-configuration"
        [ngStyle]="{
          'background-image': backgroundImageUrl ? 'url(' + backgroundImageUrl + ')' : 'none',
        }"
      >
        @if (backgroundImageUrl) {
          <div class="overlay"></div>
        }
        <div class="profile-details">
          <div class="field-wrapper">
            <app-form-textarea
              [formGroup]="modifyForm"
              controlName="Bio"
              label="Bio"
              errorMessage="Bio is required"
              [rows]="4"
            ></app-form-textarea>
          </div>
          <div class="field-wrapper">
            <h3>Links to your social media</h3>
            <p-autocomplete
              formControlName="LinksToSocialMedia"
              [multiple]="true"
              [suggestions]="[]"
              (completeMethod)="($event)"
            >
              <ng-template let-item pTemplate="selectedItem">
                <span class="item">
                  {{ item }}
                </span>
                <i class="pi" [ngClass]="getSocialNetworkIcon(item)" style="font-size: 2rem"></i>
              </ng-template>
            </p-autocomplete>
          </div>
          <div class="field-wrapper">
            <h3>Profile image</h3>
            <app-upload-file-control
              [control]="imageControl"
              fileType="image"
            ></app-upload-file-control>
          </div>
        </div>
      </div>
      @if (isAbleToEdit()) {
        <div class="library-edit">
          <button class="link" (click)="cancelEdit()" type="button">
            <i class="pi pi-times" style="font-size: 2rem"></i>
          </button>
          <button class="link" type="submit">
            <i class="pi pi-check" style="font-size: 2rem"></i>
          </button>
        </div>
      }
    </div>
  </form>
}
