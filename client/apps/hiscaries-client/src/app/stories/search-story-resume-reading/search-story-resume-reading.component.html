@if (stories(); as s) {
  @if (stories().Items.length > 0) {
    <h1 class="fs-1rem main-title">Resume reading</h1>
  }
  @if (stories().Items.length > 0 || isLoading()) {
    <app-search-story-results [stories]="s"
      [isLoading]="isLoading()"
      class="w-full"
     />
  }
} @else {
  📚💨 No pages turned yet — your adventure awaits!
}
