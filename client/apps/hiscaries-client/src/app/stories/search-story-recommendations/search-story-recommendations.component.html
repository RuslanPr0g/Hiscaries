@if (stories().Items.length > 0) {
  <h1 class="fs-1rem main-title">Stories for you to read</h1>
  <app-search-story-results [stories]="stories()"
    [isLoading]="isLoading()"
    class="w-full"
   />
} @else {
  @if (!isLoading()) {
    📚💨 No stories exist on the platform, be the first legend!
  }
}


<div #loadMoreAnchor class="load-more-anchor"></div>
