<ui-section-header title="Search result" />

<ui-infinite-scroll-grid
  [isLoading]="isLoading()"
  [isEmpty]="stories().Items.length === 0 && !isLoading()"
  [hasMore]="stories().Items.length < stories().TotalItemsCount"
  emptyMessage="No stories found 💨"
  (loadMore)="nextPage()"
>
  @for (story of stories().Items; track story.Id) {
    <ui-media-card
      [imageSrc]="story.ImagePreviewUrl | fallbackImage"
      [title]="story.Title"
      [subtitle]="story.AuthorName ?? null"
      [progressPercentage]="story.PercentageRead"
    />
  }
</ui-infinite-scroll-grid>
