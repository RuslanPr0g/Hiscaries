<div class="reading-settings-card">
  <h3>Reading Settings</h3>

  <div class="setting-item">
    <label for="theme-switch">Dark Mode</label>
    <p-toggleswitch
      id="theme-switch"
      [(ngModel)]="settings.DarkMode"
      (onChange)="toggleTheme()"
    ></p-toggleswitch>
  </div>

  <div class="setting-item">
    <label for="pdf-switch" [title]="preferPdfDisabled() ? 'Cannot switch — current page exceeds the other format\'s page count' : ''">
      Prefer PDF
    </label>
    <p-toggleswitch
      id="pdf-switch"
      [(ngModel)]="settings.PreferPdf"
      (onChange)="toggleTheme()"
      [disabled]="preferPdfDisabled()"
    ></p-toggleswitch>
  </div>
</div>
