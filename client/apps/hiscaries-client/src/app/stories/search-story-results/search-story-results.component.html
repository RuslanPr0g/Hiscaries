<ui-card-grid
  [isLoading]="!!isLoading()"
  [isEmpty]="!stories()?.Items?.length && !isLoading()"
  emptyMessage="No stories found"
  [skeletonCount]="3"
>
  @for (story of stories()?.Items ?? []; track story.Id) {
    <ui-media-card
      [imageSrc]="story.ImagePreviewUrl | fallbackImage"
      [title]="story.Title"
      [subtitle]="story.AuthorName ?? null"
      [progressPercentage]="story.PercentageRead"
      (clicked)="previewStory(story)"
    >
      <div card-footer>
        <ui-badge [label]="story.AgeLimit + '+'" />
        <ui-truncated-text [text]="story.Description" [maxLength]="70" />
      </div>
    </ui-media-card>
  }
</ui-card-grid>
