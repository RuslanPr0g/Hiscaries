<ui-section-header title="Reading history" />

@for (label of storyKeys; track label) {
  <ui-section-header [title]="label" [level]="3" />
  <ui-card-grid [isLoading]="false" [isEmpty]="false">
    @for (story of groupedStories()[label]; track story.Id) {
      <ui-media-card
        [imageSrc]="story.ImagePreviewUrl | fallbackImage"
        [title]="story.Title"
        [subtitle]="story.AuthorName ?? null"
        [progressPercentage]="story.PercentageRead"
      />
    }
  </ui-card-grid>
}

<ui-intersection-anchor
  [disabled]="isLoading() || stories().Items.length >= stories().TotalItemsCount"
  (intersected)="nextPage()"
/>
