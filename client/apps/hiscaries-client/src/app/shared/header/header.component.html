<div
  class="modal-overlay"
  (click)="closeModal()"
  (keydown.enter)="closeModal()"
  (keydown.space)="closeModal()"
  tabindex="0"
  >
  <div
    class="modal-window"
    (click)="$event.stopPropagation()"
    (keydown.enter)="$event.stopPropagation()"
    (keydown.space)="$event.stopPropagation()"
    tabindex="0"
    >
    <button class="modal-close-btn" (click)="closeModal()" aria-label="Close modal">×</button>

    <div class="search">
      <app-search-bar></app-search-bar>
    </div>

    <div class="header__options-grid">
      @for (item of items; track item) {
        <div class="header__option">
          <app-button-two
            [label]="item.Label"
            [iconType]="item.Icon"
            [ngClass]="{ warning: item.Label === 'Sign out' }"
            [isFullWidth]="true"
            (clicked)="callItemCommand(item)"
            >
            {{ item.Label }}
          </app-button-two>
        </div>
      }
    </div>

    @if (!isUserPublisher) {
      <button (click)="navigateToBecomePublisherPage()" class="link">
        I want to be a publisher!
      </button>
    }
  </div>
</div>
