<ui-card-grid
  [isLoading]="isLoading()"
  [isEmpty]="isEmpty()"
  [errorTitle]="errorTitle()"
  [errorDescription]="errorDescription()"
  [emptyIcon]="emptyIcon()"
  [emptyMessage]="emptyMessage()"
  [skeletonCount]="skeletonCount()"
  [minCardWidth]="minCardWidth()"
>
  <ng-content />
</ui-card-grid>
<ui-intersection-anchor [disabled]="!hasMore() || isLoading()" (intersected)="onIntersected()" />
