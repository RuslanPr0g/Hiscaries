<ui-glass-card
  [interactive]="interactive()"
  borderRadius="sm"
  (cardClick)="onInteract()"
  (mouseenter)="hovered.set(true)"
  (mouseleave)="hovered.set(false)"
>
  <div class="media-card__image-wrapper">
    <ui-cover-image [src]="imageSrc()" [alt]="imageAlt()" />

    <ui-hover-reveal-panel [visible]="hovered()">
      <div class="media-card__overlay-content">
        @if (subtitle()) {
          <ui-truncated-text [text]="subtitle()!" [maxLength]="60" tag="span" />
        }
      </div>
    </ui-hover-reveal-panel>
  </div>

  @if (progressPercentage() !== null) {
    <app-progress-bar [percentage]="progressPercentage()!" />
  }

  <div class="media-card__info">
    <ui-truncated-text [text]="title()" [maxLength]="40" tag="p" />
    @if (subtitle()) {
      <ui-truncated-text
        [text]="subtitle()!"
        [maxLength]="30"
        tag="span"
        class="media-card__subtitle"
      />
    }
  </div>

  <ng-content select="[card-footer]" />
</ui-glass-card>
