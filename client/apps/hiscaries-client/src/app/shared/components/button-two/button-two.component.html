@if (iconType) {
  <p-button
    [icon]="'pi ' + iconType"
    [label]="label"
    [disabled]="disabled"
    (onClick)="handleClick()"
    [ngClass]="{ 'w-full': isFullWidth }"
    [severity]="severity"
  ></p-button>
} @else {
  <p-button
    [label]="label"
    [disabled]="disabled"
    (onClick)="handleClick()"
    [ngClass]="{ 'w-full': isFullWidth }"
    [severity]="severity"
  ></p-button>
}
